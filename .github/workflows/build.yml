name: Build Paper Plugin

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # 第一步：直接克隆官方源码并现场编译那个 21MB 的胖包
    - name: Build MCProtocolLib Locally
      run: |
        git clone https://github.com/GeyserMC/MCProtocolLib.git
        cd MCProtocolLib
        # 编译并安装到本地 Maven 仓库，这会生成完整的 20MB+ 环境
        mvn clean install -DskipTests
        cd ..

    # 第二步：编译你的插件
    - name: Build Your Plugin
      run: mvn -B package --file pom.xml

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CoreLink-Plugin
        path: target/CoreLink.jar
